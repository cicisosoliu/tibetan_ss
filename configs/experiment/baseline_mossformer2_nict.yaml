# MossFormer2 on NICT-Tib1 + DEMAND, formal training @ 16 kHz.
# Upstream configs are 8 kHz; the adapter auto-scales encoder_kernel_size
# (16→32) and masknet_chunksize (250→500) to match 16 kHz.
defaults:
  - /data:     nict_tib1_full
  - /model:    mossformer2
  - /training: default
  - _self_

tag: baseline_mossformer2_nict
engine: standard
seed: 20260415
compile: true

training:
  trainer:
    max_epochs: 200
    precision: bf16-mixed
    accumulate_grad_batches: 2
    check_val_every_n_epoch: 5
  dataloader:
    batch_size: 16
    num_workers: 4
  logger:
    name: tensorboard
