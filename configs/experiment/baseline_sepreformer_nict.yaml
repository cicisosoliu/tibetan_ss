# SepReformer on NICT-Tib1 + DEMAND, formal training @ 16 kHz.
# Upstream configs are 8 kHz; we scale encoder params ×2 to match 16 kHz
# (kernel_size 16→32, stride 4→8), keeping the same temporal resolution.
defaults:
  - /data:     nict_tib1_full
  - /model:    sepreformer
  - /training: default
  - _self_

tag: baseline_sepreformer_nict
engine: standard
seed: 20260415
compile: false    # SepReformer has dynamic shapes — compile recompiles repeatedly

training:
  trainer:
    max_epochs: 200
    precision: bf16-mixed
    check_val_every_n_epoch: 5
  dataloader:
    batch_size: 8
    num_workers: 4
  logger:
    name: tensorboard
