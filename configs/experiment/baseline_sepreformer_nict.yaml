# SepReformer on NICT-Tib1 + DEMAND, formal training.
defaults:
  - /data:     nict_tib1_full
  - /model:    sepreformer
  - /training: default
  - _self_

tag: baseline_sepreformer_nict
engine: standard
seed: 20260415

training:
  trainer:
    max_epochs: 200
    precision: bf16-mixed
    check_val_every_n_epoch: 5
  dataloader:
    batch_size: 8        # SepReformer is memory-heavy at 16 kHz
    num_workers: 4
  logger:
    name: tensorboard
