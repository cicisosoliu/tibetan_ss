# DIP Frontend on NICT-Tib1 + DEMAND, formal training.
defaults:
  - /data:     nict_tib1_full
  - /model:    dip_frontend
  - /training: default
  - _self_

tag: ext_dip_nict
engine: standard
seed: 20260415

training:
  trainer:
    max_epochs: 200
    precision: bf16-mixed
  dataloader:
    batch_size: 32
    num_workers: 64
  logger:
    name: tensorboard
