# Default training config. Individual experiments may override any of these.
trainer:
  max_epochs: 200
  precision: "16-mixed"         # bf16-mixed if the GPU supports it
  accelerator: auto
  devices: auto
  strategy: auto
  gradient_clip_val: 5.0
  accumulate_grad_batches: 1
  log_every_n_steps: 50
  deterministic: false

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-3
  betas: [0.9, 0.999]
  weight_decay: 1.0e-6

scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr_ratio: 0.01

dataloader:
  batch_size: 4
  num_workers: 4
  persistent_workers: true
  pin_memory: true

# Loss / metric
loss:
  main: sisdr_pit        # neg SI-SDR with 2-speaker PIT
  aux_weights: {}

# Evaluation metrics (always computed on val / test)
eval_metrics: [si_sdr, si_sdri, pesq_wb, stoi]

# Checkpointing
checkpoint:
  monitor: val/si_sdri
  mode: max
  save_top_k: 3
  save_last: true

# Early stopping
early_stop:
  enabled: true
  monitor: val/si_sdri
  mode: max
  patience: 20

# Logger
logger:
  name: tensorboard         # tensorboard | csv
  save_dir: outputs/logs
